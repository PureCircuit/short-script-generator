<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTubeショート 台本生成ツール（無料デモ）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
    .output-card { transition: all 0.3s; }
    .output-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .copy-btn { transition: all 0.2s; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-2xl">🎬</div>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">ショート台本ジェネレーター</h1>
          <p class="text-zinc-400 text-sm">テーマ・ジャンル・ターゲット入力で即AI風台本作成</p>
        </div>
      </div>
      <div class="text-xs bg-zinc-900 px-3 py-1 rounded-full border border-zinc-700">HTMLデモ版</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-5 bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
          <span>📝</span> 入力情報
        </h2>

        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">テーマ（動画の話題）</label>
            <input id="theme" type="text" placeholder="例: 英語の発音改善" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors text-lg" />
          </div>

          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">ジャンル（動画カテゴリ）</label>
            <input id="genre" type="text" placeholder="例: 語学学習" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors text-lg" />
          </div>

          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">ターゲット（視聴者）</label>
            <input id="target" type="text" placeholder="例: 社会人初心者" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors text-lg" />
          </div>
        </div>

        <button onclick="randomIdea()" class="mt-2 w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-2xl text-sm transition-all">
          💡 ネタを自動生成（迷った人用）
        </button>

        <button onclick="generateScript()" class="mt-8 w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-bold py-5 rounded-2xl text-xl shadow-lg shadow-violet-500/30 transition-all active:scale-95">
          🚀 AIで台本を生成する
        </button>

        <p class="text-center text-zinc-500 text-xs mt-4">※これはHTMLデモです。実際のAIはAPI連携で本格化可能</p>
      </div>

      <div class="lg:col-span-7" id="results" style="display: none;">
        <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold flex items-center gap-3">
              <span>📋</span> 生成結果
            </h2>
            <button onclick="clearAll()" class="text-zinc-400 hover:text-white text-sm flex items-center gap-1">
              <span>🗑</span> クリア
            </button>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-amber-400 text-xl">①</span>
              <h3 class="font-semibold">タイトル（3案）</h3>
            </div>
            <div id="titles" class="space-y-3 text-zinc-300"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-rose-400 text-xl">②</span>
              <h3 class="font-semibold">バズフック（5案）</h3>
            </div>
            <div id="hooks" class="space-y-3 text-zinc-300"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-emerald-400 text-xl">③</span>
              <h3 class="font-semibold">共感ポイント</h3>
            </div>
            <div id="empathy" class="text-zinc-300 leading-relaxed"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-sky-400 text-xl">④</span>
              <h3 class="font-semibold">ショート動画台本（60秒以内）</h3>
            </div>
            <div id="script" class="bg-black rounded-xl p-5 font-mono text-sm leading-relaxed whitespace-pre-wrap text-zinc-300"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-orange-400 text-xl">⑤</span>
              <h3 class="font-semibold">コメント誘導文</h3>
            </div>
            <div id="comment" class="text-zinc-300"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-cyan-400 text-xl">⑥</span>
              <h3 class="font-semibold">フォロー誘導文</h3>
            </div>
            <div id="follow" class="text-zinc-300"></div>
          </div>

          <div class="output-card bg-zinc-950 border border-zinc-700 rounded-2xl p-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-purple-400 text-xl">⑦</span>
              <h3 class="font-semibold">おすすめハッシュタグ</h3>
            </div>
            <div id="hashtags" class="flex flex-wrap gap-2"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-12 text-center text-zinc-500 text-xs">
      このHTMLファイルを保存してブラウザで開けばすぐ使えます。<br />
      販売用にしたい場合は、OpenAI APIやGroq APIを追加して本物のAI生成にアップグレードできます。
    </div>
  </div>

  <script>

    const ideaThemes = ["ROBLOX攻略","小学生ゲームあるある","AIツール紹介","勉強テクニック","YouTube伸ばす方法","副業アイデア","フォートナイト攻略","ゲームの裏ワザ","YouTuberあるある","小学生の日常","AIで作る動画","バズるショート動画"];

    const viralIdeas = [
      "99%が知らないROBLOXテク",
      "小学生がハマるゲームTOP3",
      "この設定だけでゲームが上手くなる",
      "YouTubeショートが伸びる理由",
      "初心者YouTuberのミス",
      "ROBLOXで一番難しいステージ",
      "ゲーム実況が面白くなるコツ",
      "小学生YouTuberのリアル",
      "このAIツールがヤバい",
      "1日で動画が伸びた理由"
    ];
    const ideaGenres = ["ゲーム実況","教育","副業","IT","エンタメ"];
    const ideaTargets = ["小学生","中学生","初心者YouTuber","副業初心者","社会人"];

    function randomIdea(){
      document.getElementById('theme').value = ideaThemes[Math.floor(Math.random()*ideaThemes.length)];
      document.getElementById('genre').value = ideaGenres[Math.floor(Math.random()*ideaGenres.length)];
      document.getElementById('target').value = ideaTargets[Math.floor(Math.random()*ideaTargets.length)];
    }
function viralIdea(){
  const idea = viralIdeas[Math.floor(Math.random()*viralIdeas.length)];
  document.getElementById('theme').value = idea;
}

    function generateScript() {
      const theme = document.getElementById('theme').value.trim() || '英語の発音';
      const genre = document.getElementById('genre').value.trim() || '語学学習';
      const target = document.getElementById('target').value.trim() || '社会人初心者';

      const titlesHTML = `
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">1. ${theme}を${genre}で爆速マスター！${target}が即実践</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">2. 【${target}衝撃】${theme}が1週間で変わる${genre}テク</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">3. ${genre}で${theme}克服！${target}が泣いて喜ぶ方法</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
      `;
      document.getElementById('titles').innerHTML = titlesHTML;

      const hooksHTML = `
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">1. 「${theme}で毎回失敗してる…」${target}あるある</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">2. たった15秒で${theme}が変わる${genre}裏技</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">3. ${target}の99%が知らない${theme}の正しいやり方</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">4. 今日から${theme}が楽になる${genre}神テク</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
        <div class="flex justify-between gap-3 bg-zinc-900 p-4 rounded-2xl group">
          <div class="text-sm">5. ${target}が「これ知ってれば…」と後悔する${theme}</div>
          <button onclick="copyText(this)" class="copy-btn opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 text-xs bg-zinc-800 hover:bg-zinc-700 px-3 py-1 rounded-lg">コピー</button>
        </div>
      `;
      document.getElementById('hooks').innerHTML = hooksHTML;

      document.getElementById('empathy').innerHTML = `
        <p class="italic">「私も${target}の頃、${theme}で全然上達しなくて毎日挫折してました…」</p>
        <p class="mt-3 text-zinc-400">多くの${target}が同じ悩みを抱えています。このショートで「自分だけじゃない」と共感 → 最後まで見てもらえる確率アップを狙います。</p>
      `;

      const scriptText = `【${theme} × ${genre} ショート台本】

0-3秒　バズフック：
「${target}のみなさん、${theme}で毎回詰まってませんか？」

3-15秒　共感＋問題提起：
「実はほとんどの人が間違ったやり方で練習してるんです…」

15-45秒　解決ステップ（3つ）：
① まずはこれを試す
② 次にここを意識
③ 最後にこの練習を1日3回

45-55秒　結果イメージ：
「これだけで${target}のあなたが劇的に変わります！」

55-60秒　CTA：
「続きが気になる人はコメントで教えてください👇」`;
      document.getElementById('script').textContent = scriptText;

      document.getElementById('comment').innerHTML = `
        <div class="bg-zinc-900 p-5 rounded-2xl text-center text-lg">
          「この方法、試してみたい？結果をコメントで教えてください！👇」
        </div>
      `;

      document.getElementById('follow').innerHTML = `
        <div class="bg-zinc-900 p-5 rounded-2xl text-center text-lg">
          「AIで使える台本をもっと欲しい人はフォローしてね🔥」
        </div>
      `;

      const tags = ['#YouTubeShorts', `#${genre}`, `#${theme.replace(/\s+/g, '')}`, `#${target.replace(/\s+/g, '')}`, '#ショート動画', '#AI台本', `#${genre}初心者`];
      document.getElementById('hashtags').innerHTML = tags.map(tag =>
        `<span onclick="copyText(this)" class="cursor-pointer bg-zinc-800 hover:bg-violet-900 px-4 py-2 rounded-3xl text-sm transition-all">${tag}</span>`
      ).join('');

      document.getElementById('results').style.display = 'block';
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    function copyText(element) {
      let textToCopy = '';
      if (element.tagName === 'SPAN' && element.classList.contains('cursor-pointer')) {
        textToCopy = element.textContent;
      } else if (element.parentElement && element.parentElement.querySelector('div')) {
        textToCopy = element.parentElement.querySelector('div').textContent.trim();
      } else {
        textToCopy = element.closest('.output-card')?.innerText || '';
      }

      navigator.clipboard.writeText(textToCopy).then(() => {
        const original = element.textContent;
        element.textContent = '✅ コピーした！';
        setTimeout(() => {
          element.textContent = original || 'コピー';
        }, 1500);
      }).catch(() => {
        alert('コピーに失敗しました。手動でコピーしてください。');
      });
    }

    function clearAll() {
      if (confirm('すべてクリアしますか？')) {
        document.getElementById('theme').value = '';
        document.getElementById('genre').value = '';
        document.getElementById('target').value = '';
        document.getElementById('results').style.display = 'none';
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active.tagName === 'INPUT') {
          generateScript();
        }
      }
    });

    window.onload = function () {
      console.log('%c✅ YouTubeショート台本生成ツール デモ版 起動完了！', 'color:#a78bfa; font-size:13px');
    };
  </script>
</body>
</html>
